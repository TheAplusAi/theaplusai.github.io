<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+ AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔔 TOP ALERT -->
<div id="topAlert" class="top-alert">🚧 Coming Soon!</div>

<!-- TOP BAR -->
<div id="top-bar">
    <button onclick="showComingSoon()">Upgrade Plan</button>

    <div style="margin-left:auto;"></div>

    <button onclick="openAuthModal()">Login or Sign Up</button>

    <div id="profileIcon" onclick="logout()" style="display:none;">
        👤
    </div>
</div>

<img src="Logo.png" height="150">
<hr>

<!-- CHAT -->
<div class="chat-popup">
    <div class="form-container">
        <h2>Chat</h2>

        <div id="chat-messages"></div>

        <div class="input-area">
            <textarea id="msg-input" placeholder="Type a message..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<hr>
<p>Created by Aarush Mishra © 2026</p>
<script src="script.js"></script>
</body>
</html>
